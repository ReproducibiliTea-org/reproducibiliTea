<section class="about" id="about">
  <div class="section-inner">
    <div class="about-grid">
      <div>
        <p class="section-label">What is ReproducibiliTea?</p>
        <h2 class="section-title">A grassroots movement for open research</h2>
        <p class="section-body">ReproducibiliTea is a journal club initiative that helps researchers create local Open Research clubs at their universities — discussing diverse papers, ideas, and issues around improving research, reproducibility, and the Open Research movement.</p>
        <p class="section-body" style="margin-top:1rem;">Started in 2018 at the University of Oxford, ReproducibiliTea is now completely volunteer-run and offers a unique, supportive community, predominantly for Early Career Researchers.</p>
        <div class="stat-row">
          <div class="stat"><div class="stat-num">128</div><div class="stat-desc">Institutions</div></div>
          <div class="stat"><div class="stat-num">31</div><div class="stat-desc">Countries</div></div>
          <div class="stat"><div class="stat-num">~8 yrs</div><div class="stat-desc">of community</div></div>
        </div>
      </div>
      <div>
        <p class="section-label">About this conference</p>
        <h2 class="section-title">Reflecting on a decade — and looking ahead</h2>
        <p class="section-body">This one-day online conference marks a decade of the ReproducibiliTea community. We bring together researchers, practitioners, and advocates from around the world to reflect on what's been achieved — and to imagine what the next decade could look like for reproducibility in research.</p>
        <p class="section-body" style="margin-top:1rem;">No need to be nervous — this is a welcoming, community-led event and no one figures things out alone.</p>
      </div>
    </div>
  </div>
</section>
